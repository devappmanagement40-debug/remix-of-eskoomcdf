<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle background -->
  <circle cx="80" cy="80" r="78" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="3"/>
  <!-- GE text -->
  <text x="80" y="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle" letter-spacing="-2">GE</text>
  <!-- Divider line -->
  <line x1="28" y1="105" x2="132" y2="105" stroke="#2DD4BF" stroke-width="1.5" opacity="0.7"/>
  <!-- ENERGY text -->
  <text x="80" y="128" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="#2DD4BF" text-anchor="middle" letter-spacing="5">ENERGY</text>
</svg>
